<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Efikcoin Eternal | Live Rewards</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .logo { color: #d4af37; font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; letter-spacing: 2px; }
        #balance { font-size: 3rem; color: #d4af37; font-weight: bold; text-shadow: 0 0 10px rgba(212,175,55,0.5); }
        /* CENTRAL COIN - FIXED */
        .coin-btn { background: none; border: none; cursor: pointer; transition: 0.1s; margin: 20px 0; outline: none; }
        .coin-btn:active { transform: scale(0.9); }
        .coin-btn img { width: 180px; height: 180px; filter: drop-shadow(0 0 15px #d4af37); }
        .status-box { background: #111; border: 1px solid #333; padding: 10px; border-radius: 8px; width: 90%; font-size: 0.75rem; color: #00f2ff; }
    </style>
</head>
<body>

    <div class="logo">EFIKCOIN ETERNAL</div>
    <div style="font-size: 0.7rem; opacity: 0.5;">LIVE REWARD SYSTEM</div>

    <div id="balance">0.00</div>
    <div style="font-size: 0.8rem; margin-bottom: 20px;">TOTAL $ECE MINTED</div>

    <button class="coin-btn" id="tapMint">
        <img src="https://cdn-icons-png.flaticon.com/512/2585/2585244.png" alt="ECE Coin">
    </button>

    <div class="status-box" id="msg">SYSTEM READY. TAP COIN TO START MINTING.</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // UPDATED WITH YOUR REAL ID FROM SCREENSHOT
        const AdController = window.Adsgram.init({ blockId: "28286" });

        let bal = parseFloat(localStorage.getItem('ece_bal')) || 0;
        document.getElementById('balance').innerText = bal.toLocaleString();

        document.getElementById('tapMint').onclick = () => {
            const log = document.getElementById('msg');
            log.innerText = "OPENING SECURE AD CHANNEL...";

            AdController.show().then((result) => {
                // REAL WIN LOGIC
                bal += 500;
                localStorage.setItem('ece_bal', bal);
                document.getElementById('balance').innerText = bal.toLocaleString();
                log.innerText = "SUCCESS: +500 $ECE MINTED!";
                log.style.color = "#00ff00";
                tg.HapticFeedback.notificationOccurred('success');
            }).catch((err) => {
                log.innerText = "AD SKIPPED OR NETWORK ERROR. PLEASE TRY AGAIN.";
                log.style.color = "#ff4444";
            });
        };
    </script>
</body>
</html>
