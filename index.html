<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Efikcoin Eternal | Pro Miner</title>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        :root { --gold: #FFD700; --black: #0a0a0a; }
        body { background: var(--black); color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: rgba(255,215,0,0.05); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,215,0,0.2); text-align: center; width: 90%; max-width: 350px; }
        .balance-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin: 20px 0; border: 1px dashed var(--gold); }
        .balance-label { font-size: 0.8rem; color: #aaa; text-transform: uppercase; }
        .balance-amount { font-size: 2rem; font-weight: bold; color: var(--gold); }
        .btn { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #status { margin-top: 15px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>EFIKCOIN ETERNAL</h2>
    
    <div class="balance-box">
        <div class="balance-label">Your ECE Balance</div>
        <div class="balance-amount" id="userBalance">0.00</div>
    </div>

    <button class="btn" id="mintBtn">⚡ MINT +500 $ECE</button>
    <div id="status">System: <span style="color:var(--gold)">READY</span></div>
</div>

<script>
    // 1. Load existing balance from the phone's memory
    let balance = parseFloat(localStorage.getItem('ece_balance')) || 0;
    document.getElementById('userBalance').innerText = balance.toLocaleString();

    const AdController = window.Adsgram.init({ blockId: "29226" });

    document.getElementById('mintBtn').addEventListener('click', () => {
        document.getElementById('status').innerText = "Connecting to Ad Server...";
        
        AdController.show().then((result) => {
            // SUCCESS: This is where the "Productivity" happens
            balance += 500;
            localStorage.setItem('ece_balance', balance); // Save to phone
            document.getElementById('userBalance').innerText = balance.toLocaleString();
            
            document.getElementById('status').innerHTML = "<span style='color:#00ff00'>MINT SUCCESSFUL (+500)</span>";
        }).catch((err) => {
            document.getElementById('status').innerHTML = "<span style='color:#ff4444'>FAILED: " + err.description + "</span>";
        });
    });
</script>

</body>
</html>
