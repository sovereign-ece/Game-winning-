<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Efikcoin Eternal | Sovereign Finance</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        :root { --gold: #D4AF37; --bg-black: #000; --light-gold: #FFD700; }
        body { background: var(--bg-black); color: white; font-family: 'Times New Roman', Times, serif; text-align: center; margin: 0; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* The Professional Golden Headers */
        h1 { font-size: 2rem; text-transform: uppercase; letter-spacing: 3px; background: linear-gradient(to right, #fff, var(--light-gold), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        h2 { font-size: 1rem; color: #fff; font-weight: normal; letter-spacing: 1px; margin-top: 5px; margin-bottom: 25px; }

        /* The Four Quadrants */
        .grid-container { display: grid; grid-template-columns: 1fr auto 1fr; grid-template-rows: 1fr 1fr; gap: 15px; width: 95%; max-width: 500px; align-items: center; }
        
        .grid-item { display: flex; align-items: center; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; border: 1px solid rgba(212, 175, 55, 0.1); }
        .grid-item i { font-size: 2rem; color: var(--gold); margin-right: 15px; }
        .text-group { text-align: left; }
        .title { color: var(--gold); text-transform: uppercase; font-weight: bold; font-size: 0.9rem; letter-spacing: 1px; }
        .subtitle { color: #fff; font-size: 0.8rem; }

        /* The Central Central Coin (Central Column) */
        .central-col { grid-column: 2; grid-row: 1 / 3; width: 140px; display: flex; flex-direction: column; align-items: center; }
        .coin-link { position: relative; display: block; width: 100%; aspect-ratio: 1; text-decoration: none; border-radius: 50%; box-shadow: 0 0 40px rgba(212, 175, 55, 0.3); }
        .coin-img { width: 100%; height: auto; display: block; }
        .coin-glow { position: absolute; top: -10%; left: -10%; width: 120%; height: 120%; background: radial-gradient(circle, var(--light-gold) 0%, transparent 70%); opacity: 0.15; animation: pulse 2s infinite; z-index: -1; }
        
        @keyframes pulse { 0% { opacity: 0.15; } 50% { opacity: 0.3; } 100% { opacity: 0.15; } }

        /* Active Balance Display */
        .balance-box { margin-top: 25px; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; color: #aaa; }
        #balanceDisplay { font-size: 2.2rem; color: var(--light-gold); font-weight: bold; font-family: monospace; }
        
        /* The Log Area for Feedback */
        .log { margin-top: 20px; font-size: 0.7rem; color: cyan; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 5px; width: 80%; }
    </style>
</head>
<body>

    <h1>EFIKCOIN ETERNAL</h1>
    <h2>Sovereign Finance Ecosystem</h2>

    <div class="grid-container">
        
        <div class="grid-item" style="grid-column: 1; grid-row: 1;">
            <i>⚙️</i>
            <div class="text-group">
                <div class="title">TAP TO MINE</div>
            </div>
        </div>

        <div class="grid-item" style="grid-column: 1; grid-row: 2;">
            <i>📺</i>
            <div class="text-group">
                <div class="title">WATCH ADS & EARN</div>
            </div>
        </div>

        <div class="grid-item" style="grid-column: 3; grid-row: 1;">
            <i>👛</i>
            <div class="text-group">
                <div class="title">SECURE WALLET</div>
            </div>
        </div>

        <div class="grid-item" style="grid-column: 3; grid-row: 2;">
            <i>🛡️</i>
            <div class="text-group">
                <div class="title">SECURE WALLET</div>
            </div>
        </div>

        <div class="central-col">
            <a href="#" class="coin-link" id="mintBtn">
                <img src="https://i.imgur.com/your-coin-image.png" alt="ECE Coin" class="coin-img">
                <div class="coin-glow"></div>
            </div>
        </div>
    </div>

    <div class="balance-box">
        Current $ECE Balance
        <div id="balanceDisplay">0.00</div>
    </div>

    <div class="log" id="statusLog">ENGINE READY. TAP CENTRAL COIN TO MINT.</div>

    <script>
        // 1. Initialize Telegram
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // 2. Initialize Adsgram with your specific block ID
        const AdController = window.Adsgram.init({ blockId: "29226" });

        // 3. Load Persistent Local Balance
        let balance = parseFloat(localStorage.getItem('ece_vault')) || 0;
        document.getElementById('balanceDisplay').innerText = balance.toLocaleString();

        // 4. The Functional Core: Click Central Coin
        document.getElementById('mintBtn').addEventListener('click', () => {
            const statusLog = document.getElementById('statusLog');
            statusLog.innerText = "CONNECTING TO MINING CLOUD... WATCH AD TO MINT BLOCK.";
            statusLog.style.color = "cyan";

            AdController.show().then((result) => {
                // SUCCESS: User completed the ad
                balance += 500;
                localStorage.setItem('ece_vault', balance);
                
                // Update UI
                document.getElementById('balanceDisplay').innerText = balance.toLocaleString();
                statusLog.innerText = "BLOCK VERIFIED: +500 $ECE ADDED TO SECURE WALLET";
                statusLog.style.color = "#00ff00";
                
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

            }).catch((err) => {
                // Error or Skip
                statusLog.innerText = "ERROR: " + (err.description || "AD INTERRUPTED");
                statusLog.style.color = "#ff4444";
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            });
        });
    </script>
</body>
</html>
