<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Efikcoin Eternal Mainnet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        :root { --gold: #FFD700; --neon: #00f2ff; }
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .stats { border: 1px solid var(--neon); padding: 10px; margin-bottom: 20px; width: 80%; font-size: 0.8rem; background: rgba(0,242,255,0.05); }
        .balance { font-size: 2.5rem; color: var(--gold); text-shadow: 0 0 10px var(--gold); margin: 10px 0; }
        .mining-btn { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, #333, #000); border: 4px solid var(--gold); color: var(--gold); font-weight: bold; cursor: pointer; box-shadow: 0 0 20px rgba(255,215,0,0.2); transition: 0.2s; position: relative; overflow: hidden; }
        .mining-btn:active { transform: scale(0.9); }
        .mining-btn::after { content: "⛏️"; font-size: 3rem; display: block; margin-bottom: 10px; }
        .log { margin-top: 20px; font-size: 0.7rem; color: #666; height: 40px; }
    </style>
</head>
<body>

    <div class="stats">
        ENGINE: ACTIVE | HASHRATE: <span id="hashrate">0</span> KH/s<br>
        NETWORK: EFIKCOIN MAINNET 1.0
    </div>

    <div class="balance" id="displayBalance">0.00</div>
    <div style="font-size: 0.7rem; letter-spacing: 2px;">TOTAL $ECE MINTED</div>

    <button class="mining-btn" id="mineAction">MINT NOW</button>

    <div class="log" id="sysLog">SYSTEM READY... STANDBY FOR INSTRUCTION</div>

    <script>
        // 1. Initialize Telegram & Adsgram
        const tg = window.Telegram.WebApp;
        tg.expand();
        const AdController = window.Adsgram.init({ blockId: "29226" });

        let eceBalance = parseFloat(localStorage.getItem('ece_vault')) || 0;
        document.getElementById('displayBalance').innerText = eceBalance.toLocaleString();

        // 2. Mock Engine (The "Value Creation" Feel)
        setInterval(() => {
            document.getElementById('hashrate').innerText = (Math.random() * (150 - 120) + 120).toFixed(2);
        }, 1000);

        // 3. The Productive Action
        document.getElementById('mineAction').addEventListener('click', () => {
            document.getElementById('sysLog').innerText = "CONNECTING TO ADSGRAM CLOUD...";
            
            // Trigger Ad
            AdController.show().then((result) => {
                // SUCCESSFUL MINT
                eceBalance += 500;
                localStorage.setItem('ece_vault', eceBalance);
                document.getElementById('displayBalance').innerText = eceBalance.toLocaleString();
                document.getElementById('sysLog').innerText = "BLOCK VERIFIED: +500 $ECE ADDED TO VAULT";
                tg.HapticFeedback.notificationOccurred('success');
            }).catch((err) => {
                document.getElementById('sysLog').innerText = "ERROR: " + (err.description || "AD INTERRUPTED");
                tg.HapticFeedback.notificationOccurred('error');
            });
        });
    </script>
</body>
</html>
