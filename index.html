<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EFIKCOIN REWARDS | WATCH & EARN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .reward-box { background: #111; border: 2px solid #d4af37; border-radius: 20px; padding: 30px; width: 90%; max-width: 400px; box-shadow: 0 0 20px rgba(212,175,55,0.2); }
        .balance-label { font-size: 0.8rem; color: #888; letter-spacing: 2px; }
        #balance { font-size: 3.5rem; color: #d4af37; font-weight: bold; margin: 10px 0; }
        
        /* THE REAL WATCH BUTTON */
        .watch-btn { 
            background: linear-gradient(135deg, #d4af37, #b8960c); 
            color: #000; border: none; padding: 20px 40px; 
            font-size: 1.2rem; font-weight: bold; border-radius: 50px; 
            cursor: pointer; width: 100%; margin-top: 20px;
            box-shadow: 0 5px 15px rgba(212,175,55,0.4);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .watch-btn:active { transform: scale(0.95); }
        .status { margin-top: 20px; font-size: 0.7rem; color: #00f2ff; min-height: 20px; }
    </style>
</head>
<body>

    <div class="reward-box">
        <h2 style="margin-top:0; color:#d4af37;">Efikcoin Eternal</h2>
        <div class="balance-label">EARNED REWARDS</div>
        <div id="balance">0.00</div>
        
        <button class="watch-btn" id="watchVideoBtn">
            <span>📺</span> WATCH VIDEO TO EARN
        </button>

        <div class="status" id="statusText">READY TO LOAD VIDEO...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // BLOCK ID 29505
        const AdController = window.Adsgram.init({ blockId: "29505" });

        let currentPoints = parseFloat(localStorage.getItem('ece_points')) || 0;
        document.getElementById('balance').innerText = currentPoints.toFixed(2);

        document.getElementById('watchVideoBtn').onclick = () => {
            const status = document.getElementById('statusText');
            status.innerText = "LOADING VIDEO... PLEASE WAIT";
            status.style.color = "#00f2ff";

            // CALLING THE REAL ADSGRAM VIDEO
            AdController.show().then((result) => {
                // SUCCESS: User watched the whole video
                currentPoints += 500;
                localStorage.setItem('ece_points', currentPoints);
                document.getElementById('balance').innerText = currentPoints.toFixed(2);
                
                status.innerText = "SUCCESS! +500 $ECE ADDED.";
                status.style.color = "#00ff00";
                
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            }).catch((err) => {
                // FAILED: No ad found or user skipped
                status.innerText = "ERROR: NO VIDEO AVAILABLE OR SKIPPED.";
                status.style.color = "#ff4444";
                console.error("Adsgram Error:", err);
            });
        };
    </script>
</body>
</html>
