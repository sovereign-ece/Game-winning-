<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Efikcoin Eternal Mining</title>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: gold; text-align: center; padding: 20px; }
        .btn { background: gold; color: black; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; font-size: 1.2rem; }
        .status { margin-top: 20px; font-size: 0.9rem; color: #fff; }
    </style>
</head>
<body>

    <h1>Efikcoin Eternal</h1>
    <p>Mine $ECE by watching rewarded ads</p>
    
    <button class="btn" id="watchAdBtn">WATCH AD & MINT 500 ECE</button>

    <div class="status" id="statusMsg">Ready to mint...</div>

    <script>
        // Initialize Adsgram with your NEW Active Block ID
        const AdController = window.Adsgram.init({ blockId: "29226" });

        const btn = document.getElementById('watchAdBtn');
        const status = document.getElementById('statusMsg');

        btn.addEventListener('click', () => {
            status.innerText = "Loading ad...";
            
            AdController.show().then((result) => {
                // SUCCESS: User watched the whole ad
                status.innerText = "Success! 500 ECE Minted.";
                status.style.color = "lightgreen";
                
                // This triggers your Reward URL logic
                console.log("Ad completed. Reward verified.");
            }).catch((result) => {
                // ERROR or SKIP
                status.innerText = "Error: " + result.description;
                status.style.color = "red";
                console.error("Ad Error:", result);
            });
        });
    </script>
</body>
</html>
