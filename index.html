<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Efikcoin Eternal | Mainnet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        :root { --gold: #D4AF37; --bg: #000; }
        body { background: var(--bg); color: white; font-family: 'serif'; text-align: center; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        h1 { font-size: 1.6rem; color: var(--gold); margin: 0; letter-spacing: 2px; }
        p.sub { font-size: 0.8rem; margin: 5px 0 20px 0; opacity: 0.8; }

        .app-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; max-width: 400px; position: relative; }
        
        /* The Central Gold Coin */
        .coin-btn { grid-column: 1 / 3; grid-row: 1 / 3; width: 140px; height: 140px; margin: 0 auto; z-index: 10; cursor: pointer; transition: 0.2s; border: none; background: none; outline: none; }
        .coin-btn img { width: 100%; height: 100%; filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.6)); }
        .coin-btn:active { transform: scale(0.9); }

        /* Feature Cards */
        .feature { background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 10px; padding: 10px; font-size: 0.7rem; font-weight: bold; color: var(--gold); display: flex; flex-direction: column; align-items: center; }
        .feature span { color: white; margin-top: 4px; font-size: 0.6rem; }

        .bal-container { margin-top: 30px; }
        .bal-label { font-size: 0.7rem; letter-spacing: 1px; color: #888; }
        #balance { font-size: 2.5rem; font-weight: bold; color: #FFD700; }
        
        #status { margin-top: 15px; font-size: 0.7rem; color: #00f2ff; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; }
    </style>
</head>
<body>

    <h1>EFIKCOIN ETERNAL</h1>
    <p class="sub">Sovereign Finance Ecosystem</p>

    <div class="app-grid">
        <div class="feature">⚙️ TAP TO<span>MINE</span></div>
        <div class="feature">👛 SECURE<span>WALLET</span></div>
        
        <button class="coin-btn" id="mintAction">
            <img src="https://cdn-icons-png.flaticon.com/512/2585/2585244.png" alt="ECE Coin">
        </button>

        <div class="feature">📺 WATCH<span>ADS & EARN</span></div>
        <div class="feature">🛡️ SECURE<span>WALLET</span></div>
    </div>

    <div class="bal-container">
        <div class="bal-label">CURRENT $ECE BALANCE</div>
        <div id="balance">0.00</div>
    </div>

    <div id="status">ENGINE READY. TAP COIN TO MINT.</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const AdController = window.Adsgram.init({ blockId: "29226" });
        let bal = parseFloat(localStorage.getItem('ece_bal')) || 0;
        document.getElementById('balance').innerText = bal.toLocaleString();

        document.getElementById('mintAction').onclick = () => {
            const log = document.getElementById('status');
            log.innerText = "OPENING SECURE MINT CHANNEL...";
            
            AdController.show().then((result) => {
                bal += 500;
                localStorage.setItem('ece_bal', bal);
                document.getElementById('balance').innerText = bal.toLocaleString();
                log.innerText = "SUCCESS: +500 $ECE MINTED!";
                log.style.color = "#00ff00";
                tg.HapticFeedback.notificationOccurred('success');
            }).catch((err) => {
                log.innerText = "ERROR: " + (err.description || "Ad skipped");
                log.style.color = "#ff4444";
                tg.HapticFeedback.notificationOccurred('error');
            });
        };
    </script>
</body>
</html>
